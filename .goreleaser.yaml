version: 2

builds:
  - id: zgx
    binary: zgx
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/AndersSol/zgx-cli/cmd.version={{.Version}}

# macOS code-signing + notarization, cross-platform via GoReleaser's embedded
# quill — runs on the Linux runner, no Mac needed. Guarded by isEnvSet, so it is
# a no-op (unsigned release) until the MACOS_* secrets are configured.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - zgx
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

archives:
  - id: zgx
    ids:
      - zgx
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - NOTICE
      - LICENSE

# Homebrew tap: publishes a formula to AndersSol/homebrew-tap so users can
# `brew install AndersSol/tap/zgx`. Gated on HOMEBREW_TAP_TOKEN (a PAT) — when
# the token env is empty the formula is built but not pushed, so releases keep
# working until the tap token is configured.
homebrew_casks:
  - name: zgx
    ids:
      - zgx
    homepage: "https://github.com/AndersSol/zgx-cli"
    description: "Portable CLI to configure HP ZGX nano over SSH"
    repository:
      owner: AndersSol
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: "[email protected]"
    commit_msg_template: "brew: zgx {{ .Tag }}"
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: git
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
