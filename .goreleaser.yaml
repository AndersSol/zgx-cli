version: 2

builds:
  - id: zgx
    binary: zgx
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/AndersSol/zgx-cli/cmd.version={{.Version}}

archives:
  - id: zgx
    ids:
      - zgx
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - NOTICE
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: git
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
